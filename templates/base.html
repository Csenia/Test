<!DOCTYPE html>
<html lang="ru">
<head>
    {% block head %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <title>{% block title %} {% endblock %}</title>
    {% endblock %}
</head>
<body class = "body1">
    <div class="page">

        <div class="container1">
            <header class=""> 
                <div class="container"> 
                    <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
                        <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none"> 
                             <img src="{{ url_for('static', filename='img/eat.jpg') }}" alt="" height="80px" width="80px">
                        </a> 
                        <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0"> 
                            <li>
                                <a href="{{ url_for('index') }}" class="nav-link px-2 text-secondary">Главная</a>
                            </li> 
                            <li>
                                <a href="{{ url_for('AboutUs') }}" class="nav-link px-2 text-white">О нас</a>
                            </li> 
                             <li>
                                <a href="{{ url_for('create') }}" class="nav-link px-2 text-white">Добавить запись</a>
                            </li> 
                            <li>
                                <a href="{{ url_for('posts') }}" class="nav-link px-2 text-white">Все записи</a>
                            </li> 
                                 
                            </ul> 
                                
    
                        </div> 
                    </div> 
                </header>
        
        </div>
        <main class="content">
    
            {% block body %}
            {% endblock %}
    
        </main>
        <div class="d-flex">
    
            <footer class="d-flex1"> 
                <div class="col-md-4 d-flex align-items-center"> 
                    <a href="/" class="mb-3 me-2 mb-md-0 text-body-secondary text-decoration-none lh-1" aria-label="Загрузочный Стрэп"> 
                        <img src="{{ url_for('static', filename='img/eat.jpg') }}" alt="" width="50px" height="50px">  
                    </a> 
                    <span class="mb-3 mb-md-0 text-body-secondary">© 2026 Ксения Прищепенкова — сделано с ❤️ и юмором</span>
                 </div> 
                <ul class="nav col-md-4 justify-content-end list-unstyled d-flex"> 
                    <li class="ms-3">
                        <a class="text-body-secondary" href="#" aria-label="Instagram">
                            <svg class="bi" width="24" height="24" aria-hidden="true">
                                <use xlink:href="#instagram"></use>
                            </svg>
                        </a>
                    </li> 
                    <li class="ms-3">
                        <a class="text-body-secondary" href="#" aria-label="Facebook">
                            <svg class="bi" width="24" height="24">
                                <use xlink:href="#facebook"></use>
                            </svg>
                        </a>
                    </li> 
                </ul> 
            </footer>
        </div>
    </div>
</body>
</html>
